	adafruit/Adafruit GFX Library@^1.12.6
	paulstoffregen/Time@^1.6.1
	mikalhart/TinyGPSPlus@^1.1.0
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.6
